# .github/workflows/test-to-prod.yml
#
# Place this file inside EACH of the three repos:
#   Learn/.github/workflows/test-to-prod.yml
#   Projects/.github/workflows/test-to-prod.yml
#   profile/.github/workflows/test-to-prod.yml
#
# What it does:
#   - Runs every day at 06:30 UTC = 12:00 noon IST
#   - Attempts to merge TEST → PROD
#   - If merge conflict: skips, postpones to next day, sends email alert
#   - Can also be triggered manually from GitHub Actions tab

name: Daily TEST → PROD merge (12:00 IST)

on:
  schedule:
    # 06:30 UTC = 12:00 noon IST (UTC+5:30)
    - cron: '30 6 * * *'
  workflow_dispatch:   # allows manual trigger from GitHub UI

jobs:
  merge-test-to-prod:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # ── 1. Checkout PROD branch ──────────────────────────────────────────
      - name: Checkout PROD branch
        uses: actions/checkout@v4
        with:
          ref: PROD
          fetch-depth: 0       # full history needed for merge
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Configure git identity ─────────────────────────────────────────
      - name: Set git identity
        run: |
          git config user.name  "the-naman-bot"
          git config user.email "actions@github.com"

      # ── 3. Fetch TEST branch ──────────────────────────────────────────────
      - name: Fetch TEST branch
        run: git fetch origin TEST

      # ── 4. Attempt merge TEST → PROD ─────────────────────────────────────
      - name: Merge TEST into PROD
        id: merge
        run: |
          git merge origin/TEST --no-ff -m "chore: daily auto-merge TEST→PROD [$(date +'%Y-%m-%d')]" \
            || echo "MERGE_FAILED=true" >> $GITHUB_OUTPUT

      # ── 5. Push if merge succeeded ────────────────────────────────────────
      - name: Push PROD
        if: steps.merge.outputs.MERGE_FAILED != 'true'
        run: |
          git push origin PROD
          echo "✅ TEST → PROD merged and pushed successfully."

      # ── 6. Abort merge on conflict ────────────────────────────────────────
      - name: Abort conflicted merge
        if: steps.merge.outputs.MERGE_FAILED == 'true'
        run: |
          git merge --abort || true
          echo "⚠️  Merge conflict detected. Merge aborted. Will retry tomorrow."

      # ── 7. Send email alert on conflict ───────────────────────────────────
      - name: Send conflict alert email
        if: steps.merge.outputs.MERGE_FAILED == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          # Store these as GitHub repo Secrets:
          #   MAIL_USERNAME  → your Gmail address
          #   MAIL_PASSWORD  → Gmail App Password (not your main password)
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "⚠️ Merge conflict in ${{ github.repository }} — TEST→PROD skipped"
          to: ${{ secrets.MAIL_USERNAME }}
          from: "GitHub Actions <${{ secrets.MAIL_USERNAME }}>"
          body: |
            Hello Naman,

            The daily automated merge from TEST → PROD in repository
            "${{ github.repository }}" was SKIPPED today due to a merge conflict.

            Details:
              Repository : ${{ github.repository }}
              Date       : ${{ github.run_id }} — ran at 06:30 UTC (12:00 IST)
              Branch     : TEST → PROD

            What to do:
              1. Open: https://github.com/${{ github.repository }}
              2. Go to the Pull Requests tab → compare TEST vs PROD
              3. Resolve the conflicts manually
              4. Merge manually, or let the automation retry tomorrow at 12:00 IST

            This merge has been postponed to the next scheduled run (tomorrow at 12:00 IST).

            — Your GitHub Automation Bot
