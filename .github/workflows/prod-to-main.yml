name: PROD to main merge (after TEST to PROD)

on:
  workflow_run:
    workflows: ["Daily TEST → PROD merge (12:00 IST)"]
    types:
      - completed
  workflow_dispatch:

jobs:
  merge-prod-to-main:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    permissions:
      contents: write

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4.2.2
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set git identity
        run: |
          git config user.name "the-naman-bot"
          git config user.email "actions@github.com"

      - name: Fetch PROD branch
        run: git fetch origin PROD

      - name: Merge PROD into main
        id: merge
        run: |
          git merge origin/PROD --no-ff -m "chore: auto-merge PROD to main $(date +'%Y-%m-%d')" \
            || echo "MERGE_FAILED=true" >> $GITHUB_OUTPUT

      - name: Push main
        if: steps.merge.outputs.MERGE_FAILED != 'true'
        run: |
          git push origin main
          echo "PROD to main merged and pushed successfully."

      - name: Abort conflicted merge
        if: steps.merge.outputs.MERGE_FAILED == 'true'
        run: |
          git merge --abort || true
          echo "Merge conflict detected. Aborted."

      - name: Send conflict alert email
        if: steps.merge.outputs.MERGE_FAILED == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "Merge conflict in ${{ github.repository }} PROD to main skipped"
          to: ${{ secrets.MAIL_USERNAME }}
          from: "GitHub Actions <${{ secrets.MAIL_USERNAME }}>"
          body: |
            Hello Naman,

            The automated merge from PROD to main in repository
            "${{ github.repository }}" was SKIPPED due to a merge conflict.

            Details:
              Repository : ${{ github.repository }}
              Branch     : PROD to main

            What to do:
              1. Open: https://github.com/${{ github.repository }}
              2. Go to Pull Requests and compare PROD vs main
              3. Resolve the conflicts manually
              4. Merge manually, or wait for next automatic run

            Your GitHub Automation Bot